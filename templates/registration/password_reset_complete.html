{% extends 'base.html' %}

{% block title %}Senha redefinida — BolãoCopa{% endblock %}

{% block content %}
<div class='min-h-[80vh] flex items-center justify-center'>
    <div class='w-full max-w-md'>
        <div class='bg-gray-900 border border-gray-700 rounded-xl p-8'>
            <h1 class='text-3xl md:text-4xl font-bold text-white text-center mb-8'>Senha redefinida</h1>

            <div class='bg-emerald-600/20 border border-emerald-500 text-emerald-400 px-4 py-3 rounded-lg mb-6'>
                <p>Sua senha foi redefinida com sucesso.</p>
            </div>

            <div class='text-center'>
                <a href='{% url "login" %}' class='text-emerald-400 hover:text-emerald-300 transition-colors duration-200'>Entrar com a nova senha</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
